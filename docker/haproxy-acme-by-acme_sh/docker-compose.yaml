services:
  haproxy:
    image: haproxy:3.2-alpine
    container_name: haproxy-${HAPROXY_PROFILE}
    restart: unless-stopped
    networks:
      - webnet
    ports:
      - "40080:80"
      - "40443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/etc/haproxy/certs
    depends_on:
      - webapp

  acme:
    image: neilpang/acme.sh
    container_name: acme-${HAPROXY_PROFILE}
    restart: "no"
    networks:
      - webnet
    volumes:
      - ./certs:/acme.sh
      - ./acme-dns-hooks:/root/.acme.sh/dnsapi
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - MOUSETRAP_API_URL=${MOUSETRAP_API_URL}
      - MOUSETRAP_TOKEN=${MOUSETRAP_TOKEN}
      - MOUSETRAP_ZONE=${MOUSETRAP_ZONE}
    # Using the default entrypoint of neilpang/acme.sh
    command: --renew -d ${APP_DOMAIN} --server letsencrypt_test --dns dns_mousetrap --debug 2

  webapp:
    image: nginx:alpine
    container_name: webapp-${HAPROXY_PROFILE}
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
