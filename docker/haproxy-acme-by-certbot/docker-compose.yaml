services:
  haproxy:
    image: haproxy:3.2-alpine
    container_name: haproxy-${HAPROXY_PROFILE}
    restart: unless-stopped
    networks:
      - webnet
    ports:
      - "40080:80"
      - "40443:443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs:/etc/haproxy/certs
    depends_on:
      - webapp

  certbot:
    build:
      context: .
      dockerfile: Dockerfile.certbot
    container_name: certbot-${HAPROXY_PROFILE}
    restart: "no"
    networks:
      - webnet
    # Exit 0 if no arguments, otherwise run certbot with arguments
    entrypoint: ["/bin/sh", "-c", "if [ $# -eq 0 ]; then exit 0; fi; exec certbot \"$@\"", "sh"]
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - MOUSETRAP_API_URL=${MOUSETRAP_API_URL}
      - MOUSETRAP_TOKEN=${MOUSETRAP_TOKEN}
      - MOUSETRAP_ZONE=${MOUSETRAP_ZONE}
    volumes:
      - ./certbot-data:/etc/letsencrypt
      - ./certs:/certs
      - ./certbot-hooks:/hooks

  webapp:
    image: nginx:alpine
    container_name: webapp-${HAPROXY_PROFILE}
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
